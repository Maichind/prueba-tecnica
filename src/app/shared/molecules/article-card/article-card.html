<article class="flex flex-col gap-4">
  <app-image-placeholder [alt]="article.imageAlt" aspectRatio="video" />

  <div class="flex flex-col gap-4">
    <app-badge [label]="article.category" />

    <h3 class="text-[23px] leading-6.25 md:text-3xl md:leading-9.5 md:line-clamp-2 font-bold text-black">
      {{ article.title }}
    </h3>

    <p class="text-base leading-6 line-clamp-6 text-text-primary">
      {{ article.description }}
    </p>
  </div>
</article>
